    <div class="max-w-md mx-auto px-4 pt-6">
        <header class="mb-5 flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
            <div>
                <h1 id="txt-app-title" class="text-lg font-bold text-gray-900">생두 품질 검사 결과 입력기</h1>
                <p class="text-[10px] text-gray-400 font-mono">Cafe Nogales Q.C System</p>
            </div>
            <div class="flex items-center bg-gray-100 p-0.5 rounded-lg border border-gray-200">
                <button type="button" onclick="changeLanguage('ko')" id="btn-lang-ko" class="px-2.5 py-1 text-xs font-bold rounded-md transition-all bg-white shadow-sm text-blue-600">KO</button>
                <button type="button" onclick="changeLanguage('en')" id="btn-lang-en" class="px-2.5 py-1 text-xs font-bold rounded-md transition-all text-gray-400">EN</button>
            </div>
        </header>

        <div class="mb-5 bg-blue-50 border border-blue-150 p-4 rounded-xl flex items-center justify-between gap-3 shadow-sm">
            <div class="flex-1">
                <label id="lbl-draft" class="block text-xs font-bold text-blue-800 mb-1">📁 진행 중인 임시저장 데이터 불러오기</label>
                <select id="draftSelect" class="w-full bg-white border border-blue-200 rounded-lg p-2 text-xs text-gray-700 focus:outline-none shadow-sm">
                    <option value="">-- 새로 작성하기 또는 목록 새로고침 --</option>
                </select>
            </div>
            <button type="button" id="btn-refresh" onclick="loadDraftList()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-3 py-3 rounded-lg shadow-sm h-fit self-end transition-all">
                🔄 새로고침
            </button>
        </div>

        <form id="qcForm" class="space-y-4">
            <input type="hidden" id="currentRowId" value="">

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <button type="button" class="w-full px-4 py-3 bg-gray-50 flex justify-between items-center border-b border-gray-150 font-bold text-sm text-gray-800" onclick="toggleAccordion(this)">
                    <span id="lbl-sec1">기본 정보</span>
                    <span class="arrow text-xs text-gray-400">▲</span>
                </button>
                <div class="accordion-content p-4 space-y-3">
                    <div>
                        <label id="lbl-coffeeName" class="block text-xs font-semibold text-gray-600 mb-1">커피 이름</label>
                        <input type="text" id="field_1" required class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div>
                        <label id="lbl-grade" class="block text-xs font-semibold text-gray-600 mb-1">Grade</label>
                        <div class="grid grid-cols-2 gap-2" id="group_field_2">
                            <button type="button" data-value="Microlot" class="py-2 text-xs font-medium border border-gray-200 rounded-lg bg-gray-50 select-single">Microlot</button>
                            <button type="button" data-value="Regional" class="py-2 text-xs font-medium border border-gray-200 rounded-lg bg-gray-50 select-single">Regional</button>
                        </div>
                    </div>
                    <div>
                        <label id="lbl-gradingDate" class="block text-xs font-semibold text-gray-600 mb-1">Green Grading date</label>
                        <input type="date" id="field_3" required class="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <button type="button" class="w-full px-4 py-3 bg-gray-50 flex justify-between items-center border-b border-gray-150 font-bold text-sm text-gray-800" onclick="toggleAccordion(this, true)">
                    <span id="lbl-sec2">시각적 특성</span>
                    <span class="arrow text-xs text-gray-400">▼</span>
                </button>
                <div class="accordion-content closed p-4 space-y-4">
                    <div>
                        <label id="lbl-probType" class="block text-xs font-semibold text-gray-600 mb-1.5">Type of Problem</label>
                        <div class="grid grid-cols-1 gap-1.5" id="group_field_13"></div>
                    </div>
                    <div>
                        <label id="lbl-sizeUnif" class="block text-xs font-semibold text-gray-600 mb-1">Overall Visual-Size uniformity</label>
                        <div class="grid grid-cols-3 gap-2" id="group_field_14">
                            <button type="button" data-value="Uniform" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Uniform</button>
                            <button type="button" data-value="Average" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Average</button>
                            <button type="button" data-value="Out of average" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Out of average</button>
                        </div>
                    </div>
                    <div>
                        <label id="lbl-sizeUnifComm" class="block text-xs font-semibold text-gray-600 mb-1.5">Overall Visual-Size uniformity_Comment</label>
                        <div class="flex flex-col space-y-1.5" id="group_field_15"></div>
                    </div>
                    <div>
                        <label id="lbl-colorUnif" class="block text-xs font-semibold text-gray-600 mb-1">Overall Visual-Colour uniformity</label>
                        <div class="grid grid-cols-3 gap-2" id="group_field_16">
                            <button type="button" data-value="Uniform" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Uniform</button>
                            <button type="button" data-value="Average" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Average</button>
                            <button type="button" data-value="Out of average" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Out of average</button>
                        </div>
                    </div>
                    <div>
                        <label id="lbl-color" class="block text-xs font-semibold text-gray-600 mb-1">Overall Visual-Colour</label>
                        <div class="grid grid-cols-1 gap-1.5" id="group_field_17">
                            <button type="button" data-value="Dark Green" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Dark Green</button>
                            <button type="button" data-value="Normal Green" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Normal Green</button>
                            <button type="button" data-value="Light Green" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Light Green</button>
                            <button type="button" data-value="Green & Yellow/Brown" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Green & Yellow/Brown</button>
                            <button type="button" data-value="Mostly Yellow (Sour bean cannot be separated)" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Mostly Yellow (Sour bean cannot be separated)</button>
                            <button type="button" data-value="Mostly Brown (Sour bean cannot be separated)" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Mostly Brown (Sour bean cannot be separated)</button>
                            <button type="button" data-value="White" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">White</button>
                        </div>
                    </div>
                    <div>
                        <label id="lbl-fading" class="block text-xs font-semibold text-gray-600 mb-1">Overall Visual-Overall Fading</label>
                        <div class="grid grid-cols-1 gap-1.5" id="group_field_18">
                            <button type="button" data-value="No Faded" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">No Faded</button>
                            <button type="button" data-value="Slightly Faded" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Slightly Faded</button>
                            <button type="button" data-value="Severe Faded (Partially decoloured bean cannot be separated)" class="py-1.5 text-left px-3 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Severe Faded (Partially decoloured bean cannot be separated)</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <button type="button" class="w-full px-4 py-3 bg-gray-50 flex justify-between items-center border-b border-gray-150 font-bold text-sm text-gray-800" onclick="toggleAccordion(this, true)">
                    <span id="lbl-sec3">상세 결점두 카운팅</span>
                    <span class="arrow text-xs text-gray-400">▼</span>
                </button>
                <div class="accordion-content closed p-4 grid grid-cols-1 gap-3 sm:grid-cols-2" id="defectCounters"></div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <button type="button" class="w-full px-4 py-3 bg-gray-50 flex justify-between items-center border-b border-gray-150 font-bold text-sm text-gray-800" onclick="toggleAccordion(this, true)">
                    <span id="lbl-sec4">중량 및 결점두 영향력</span>
                    <span class="arrow text-xs text-gray-400">▼</span>
                </button>
                <div class="accordion-content closed p-4 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label id="lbl-qtyAll" class="block text-xs font-semibold text-gray-600 mb-1">Quantity-All (g)</label>
                            <input type="number" id="field_28" value="500" class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 outline-none">
                        </div>
                        <div>
                            <label id="lbl-qtyDef" class="block text-xs font-semibold text-gray-600 mb-1">Quantity-Defect (g)</label>
                            <input type="number" id="field_29" class="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none">
                        </div>
                    </div>
                    <div>
                        <label id="lbl-defectEffect" class="block text-xs font-semibold text-gray-600 mb-1">Defect-effect to Quality (internal)</label>
                        <div class="grid grid-cols-3 gap-1.5" id="group_field_19">
                            <button type="button" data-value="Low" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Low</button>
                            <button type="button" data-value="Medium-Low" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Med-Low</button>
                            <button type="button" data-value="Medium" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Medium</button>
                            <button type="button" data-value="Medium-High" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Med-High</button>
                            <button type="button" data-value="High" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">High</button>
                            <button type="button" data-value="Did not grading" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">NoGrade</button>
                        </div>
                    </div>
                    <div>

                            <button type="button" data-value="Low" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Low</button>
                            <button type="button" data-value="Average" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Average</button>
                            <button type="button" data-value="High" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">High</button>
                            <button type="button" data-value="Caution" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Caution</button>
                            <button type="button" data-value="N/A" class="py-1 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">N/A</button>
                        </div>
                    </div>
                    <div>
                        <label id="lbl-majorDefect" class="block text-xs font-semibold text-gray-600 mb-1">Major defect</label>
                        <div class="grid grid-cols-2 gap-1.5" id="group_field_21"></div>
                    </div>
                    <div>
                        <label id="lbl-defectComm" class="block text-xs font-semibold text-gray-600 mb-1">Defect_Comment</label>
                        <div class="flex flex-col space-y-1.5" id="group_field_22"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <button type="button" class="w-full px-4 py-3 bg-gray-50 flex justify-between items-center border-b border-gray-150 font-bold text-sm text-gray-800" onclick="toggleAccordion(this, true)">
                    <span id="lbl-sec5">종합 평가</span>
                    <span class="arrow text-xs text-gray-400">▼</span>
                </button>
                <div class="accordion-content closed p-4 space-y-3">
                    <div>
                        <label id="lbl-qualityChange" class="block text-xs font-semibold text-gray-600 mb-1">Quality change from PSS</label>
                        <div class="grid grid-cols-4 gap-1.5" id="group_field_9">
                            <button type="button" data-value="Better" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Better</button>
                            <button type="button" data-value="Same" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Same</button>
                            <button type="button" data-value="Worse" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">Worse</button>
                            <button type="button" data-value="No PSS" class="py-1.5 text-xs border border-gray-200 rounded-lg bg-gray-50 select-single">No PSS</button>
                        </div>
                    </div>
                    <div>
                        <label id="lbl-koComment" class="block text-xs font-semibold text-gray-600 mb-1">Overall Quality Comments (KO)</label>
                        <textarea id="field_11" rows="3" class="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none"></textarea>
                    </div>
                    <div>
                        <label id="lbl-enComment" class="block text-xs font-semibold text-gray-600 mb-1">Overall Quality Comments (EN)</label>
                        <textarea id="field_10" rows="3" class="w-full p-2 border border-gray-300 rounded-lg text-sm outline-none"></textarea>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <button type="button" id="btn-draft" onclick="submitData('Draft')" class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl shadow-md transition-all text-sm">
                    💾 임시 저장
                </button>
                <button type="button" id="btn-complete" onclick="submitData('Completed')" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-all text-sm">
                    🚀 검사 완료
                </button>
            </div>
        </form>
    </div>

    <script>
        let currentLang = "ko";
        let activeDraftsList = [];

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered Successfully', reg))
                    .catch(err => console.error('Service Worker Registration Failed', err));
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('field_3').value = new Date().toISOString().substring(0, 10);
            renderLanguageUI();
            buildDefectCounters();
            setupInteractions();
            
            if (GOOGLE_WEB_APP_URL.includes("여기에_")) {
                alert("🛑 [안내] 코드 맨 윗줄의 GOOGLE_WEB_APP_URL에 배포받으신 구글 스크립트 웹앱 주소를 입력하셔야 스프레드시트와 동기화가 이루어집니다.");
            } else {
                loadDraftList();
            }
        });

        function toggleAccordion(button, forceClose = false) {
            const content = button.nextElementSibling;
            const arrow = button.querySelector('.arrow');
            
            if (forceClose && !content.style.maxHeight && !content.classList.contains('closed')) {
                content.classList.add('closed');
                arrow.textContent = '▼';
                return;
            }

            if (content.classList.contains('closed')) {
                content.classList.remove('closed');
                arrow.textContent = '▲';
            } else {
                content.classList.add('closed');
                arrow.textContent = '▼';
            }
        }

        function changeLanguage(lang) {
            if(lang === currentLang) return;
            currentLang = lang;
            
            const btnKo = document.getElementById('btn-lang-ko');
            const btnEn = document.getElementById('btn-lang-en');
            if(lang === 'ko') {
                btnKo.className = "px-2.5 py-1 text-xs font-bold rounded-md transition-all bg-white shadow-sm text-blue-600";
                btnEn.className = "px-2.5 py-1 text-xs font-bold rounded-md transition-all text-gray-400";
            } else {
                btnKo.className = "px-2.5 py-1 text-xs font-bold rounded-md transition-all text-gray-400";
                btnEn.className = "px-2.5 py-1 text-xs font-bold rounded-md transition-all bg-white shadow-sm text-blue-600";
            }
            renderLanguageUI();
        }

        function renderLanguageUI() {
            const data = UI_LANG[currentLang];
            document.getElementById('txt-app-title').textContent = data.title;
            document.getElementById('lbl-draft').textContent = data.draftLabel;
            document.getElementById('btn-refresh').textContent = data.refreshBtn;
            document.getElementById('lbl-sec1').textContent = data.sec1;
            document.getElementById('lbl-sec2').textContent = data.sec2;
            document.getElementById('lbl-sec3').textContent = data.sec3;
            document.getElementById('lbl-sec4').textContent = data.sec4;
            document.getElementById('lbl-sec5').textContent = data.sec5;
            document.getElementById('lbl-coffeeName').textContent = data.coffeeName;
            document.getElementById('lbl-grade').textContent = data.grade;
            document.getElementById('lbl-gradingDate').textContent = data.gradingDate;
            document.getElementById('lbl-probType').textContent = data.probType;
            document.getElementById('lbl-sizeUnif').textContent = data.sizeUnif;
            document.getElementById('lbl-sizeUnifComm').textContent = data.sizeUnifComm;
            document.getElementById('lbl-colorUnif').textContent = data.colorUnif;
            document.getElementById('lbl-color').textContent = data.color;
            document.getElementById('lbl-fading').textContent = data.fading;
            document.getElementById('lbl-qtyAll').textContent = data.qtyAll;
            document.getElementById('lbl-qtyDef').textContent = data.qtyDef;
            document.getElementById('lbl-defectEffect').textContent = data.defectEffect;
            document.getElementById('lbl-defectInGrade').textContent = data.defectInGrade;
            document.getElementById('lbl-majorDefect').textContent = data.majorDefect;
            document.getElementById('lbl-defectComm').textContent = data.defectComm;
            document.getElementById('lbl-qualityChange').textContent = data.qualityChange;
            document.getElementById('lbl-koComment').textContent = data.koComment;
            document.getElementById('lbl-enComment').textContent = data.enComment;
            document.getElementById('btn-draft').textContent = data.btnDraft;
            document.getElementById('btn-complete').textContent = data.btnComplete;
            rebuildDynamicButtons();
        }

        function rebuildDynamicButtons() {
            const activeValues = {};
            document.querySelectorAll('.active-btn').forEach(b => {
                const grp = b.parentElement.id;
                if(grp) {
                    if(!activeValues[grp]) activeValues[grp] = [];
                    activeValues[grp].push(b.dataset.value);
                }
            });

            const probGroup = document.getElementById('group_field_13');
            probGroup.innerHTML = '';
            Object.keys(DICTIONARY.problem).forEach(ko => {
                const label = (currentLang === 'ko') ? ko : DICTIONARY.problem[ko];
                probGroup.innerHTML += `<button type="button" data-value="${ko}" class="py-2 px-3.5 text-left text-xs border border-gray-200 rounded-lg bg-gray-50 text-gray-700 select-multi transition-all">${label}</button>`;
            });

            const sizeGroup = document.getElementById('group_field_15');
            sizeGroup.innerHTML = '';
            Object.keys(DICTIONARY.sizeComment).forEach(ko => {
                const label = (currentLang === 'ko') ? ko : DICTIONARY.sizeComment[ko];
                sizeGroup.innerHTML += `<button type="button" data-value="${ko}" class="py-2 px-3.5 text-left text-xs border border-gray-200 rounded-lg bg-gray-50 text-gray-700 select-single transition-all">${label}</button>`;
            });

            const majorList = ["Sour (Yellow/Brown)", "Insect (Bug)", "Broken (Broken/Cracked)", "Shell/Elephant (Deformed)", "Immature (Unripe)", "Discolored (Faded)", "Withered", "Crystallized", "Under dried", "None", "N/A"];
            const majorGroup = document.getElementById('group_field_21');
            majorGroup.innerHTML = '';
            majorList.forEach(val => {
                majorGroup.innerHTML += `<button type="button" data-value="${val}" class="py-2 px-2.5 text-xs border border-gray-200 rounded-lg bg-gray-50 text-gray-700 select-multi transition-all">${val}</button>`;
            });

            const defCommentGroup = document.getElementById('group_field_22');
            defCommentGroup.innerHTML = '';
            Object.keys(DICTIONARY.defectComment).forEach(ko => {
                const label = (currentLang === 'ko') ? ko : DICTIONARY.defectComment[ko];
                defCommentGroup.innerHTML += `<button type="button" data-value="${ko}" class="py-2.5 px-3 text-left text-xs border border-gray-200 rounded-lg bg-gray-50 text-gray-700 select-multi transition-all">${label}</button>`;
            });

            Object.keys(activeValues).forEach(grpId => {
                const grp = document.getElementById(grpId);
                if(grp) {
                    activeValues[grpId].forEach(val => {
                        const target = grp.querySelector(`[data-value="${val}"]`);
                        if(target) target.classList.add('active-btn');
                    });
                }
            });
        }

        function buildDefectCounters() {
            const container = document.getElementById('defectCounters');
            container.innerHTML = '';
            DEFECT_TYPES.forEach((name, index) => {
                const fieldNum = 30 + index;
                container.innerHTML += `
                    <div class="bg-gray-50 p-2.5 rounded-lg border border-gray-200 flex items-center justify-between gap-2">
                        <span class="text-xs font-semibold text-gray-700 break-words max-w-[160px]">${name}</span>
                        <div class="flex items-center gap-1 shrink-0">
                            <button type="button" onclick="stepCount(${fieldNum}, -1)" class="w-8 h-8 bg-white border border-gray-300 rounded-lg font-bold text-sm active:bg-gray-100 select-none shadow-2xs">-</button>
                            <input type="number" id="field_${fieldNum}" value="0" min="0" class="w-12 h-8 text-center bg-white border border-gray-300 rounded-lg text-xs font-bold font-mono outline-none shadow-2xs">
                            <button type="button" onclick="stepCount(${fieldNum}, 1)" class="w-8 h-8 bg-white border border-gray-300 rounded-lg font-bold text-sm active:bg-gray-100 select-none shadow-2xs">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function stepCount(fieldNum, amount) {
            const input = document.getElementById(`field_${fieldNum}`);
            let val = parseInt(input.value) || 0;
            val += amount;
            if(val < 0) val = 0;
            input.value = val;
        }

        function setupInteractions() {
            document.addEventListener('click', function(e) {
                if(e.target && e.target.classList.contains('select-single')) {
                    const parent = e.target.parentElement;
                    parent.querySelectorAll('.select-single').forEach(b => b.classList.remove('active-btn'));
                    e.target.classList.add('active-btn');
                }
            });

            document.addEventListener('click', function(e) {
                if(e.target && e.target.classList.contains('select-multi')) {
                    e.target.classList.toggle('active-btn');
                }
            });

            document.getElementById('draftSelect').addEventListener('change', function() {
                loadSelectedDraft(this.value);
            });
        }

        function getSingleValue(groupId) {
            const active = document.getElementById(groupId).querySelector('.active-btn');
            return active ? active.dataset.value : "";
        }
        function setSingleValue(groupId, value) {
            const parent = document.getElementById(groupId);
            parent.querySelectorAll('.select-single').forEach(b => b.classList.remove('active-btn'));
            if(!value) return;
            const target = parent.querySelector(`[data-value="${value}"]`);
            if(target) target.classList.add('active-btn');
        }

        document.getElementById('qcForm').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
            }
        });

        function getMultiValues(groupId) {
            const actives = document.getElementById(groupId).querySelectorAll('.active-btn');
            return Array.from(actives).map(b => b.dataset.value);
        }
        function setMultiValues(groupId, valuesArray) {
            const parent = document.getElementById(groupId);
            parent.querySelectorAll('.select-multi').forEach(b => b.classList.remove('active-btn'));
            if(!valuesArray || valuesArray.length === 0) return;
            valuesArray.forEach(val => {
                const target = parent.querySelector(`[data-value="${val}"]`);
                if(target) target.classList.add('active-btn');
            });
        }

        function loadDraftList() {
            if (GOOGLE_WEB_APP_URL.includes("여기에_")) return;
            const select = document.getElementById('draftSelect');
            const defaultTxt = UI_LANG[currentLang].draftEmpty;
            select.innerHTML = `<option value="">⏳ Syncing...</option>`;
            
            fetch(GOOGLE_WEB_APP_URL)
            .then(res => res.json())
            .then(data => {
                activeDraftsList = data;
                select.innerHTML = `<option value="">${defaultTxt}</option>`;
                if(data.length === 0) return;
                data.forEach(item => {
                    const name = item.col_1 || "Unknown Bean";
                    const date = item.col_11 || "No Date"; 
                    const rowId = item.col_60;
                    select.innerHTML += `<option value="${rowId}">${name} (${date.substring(0,10)})</option>`;
                });
            })
            .catch(err => {
                alert("🛑 [Error] 임시저장 목록 갱신에 실패했습니다. 구글 계정 배포 권한이나 URL 주소를 다시 한 번 확인하세요.");
                console.error(err);
                select.innerHTML = `<option value="">Network Sync Error</option>`;
            });
        }

        function loadSelectedDraft(rowId) {
            if(!rowId) {
                document.getElementById('qcForm').reset();
                document.getElementById('currentRowId').value = "";
                document.getElementById('field_28').value = "500";
                document.querySelectorAll('.active-btn').forEach(b => b.classList.remove('active-btn'));
                return;
            }
            
            const match = activeDraftsList.find(d => d.col_60 == rowId);
            if(!match) return;

            document.getElementById('currentRowId').value = rowId;
            document.getElementById('field_1').value = match.col_1 || "";
            setSingleValue('group_field_2', match.col_2);
            document.getElementById('field_3').value = match.col_11 ? match.col_11.substring(0,10) : "";
            setSingleValue('group_field_9', match.col_17);
            document.getElementById('field_10').value = match.col_18 || "";
            document.getElementById('field_11').value = match.col_19 || "";

            if(match.col_21) {
                const rawEns = match.col_21.split(', ');
                const matchedKos = [];
                Object.keys(DICTIONARY.problem).forEach(k => {
                    if(rawEns.includes(DICTIONARY.problem[k])) matchedKos.push(k);
                });
                setMultiValues('group_field_13', matchedKos);
            }
            
            setSingleValue('group_field_14', match.col_22);
            if(match.col_23) setSingleValue('group_field_15', match.col_23.split(' (')[0]);
            setSingleValue('group_field_16', match.col_24);
            setSingleValue('group_field_17', match.col_25);
            setSingleValue('group_field_18', match.col_26);
            setSingleValue('group_field_19', match.col_28);
            setSingleValue('group_field_20', match.col_29);
            
            if(match.col_30) setMultiValues('group_field_21', match.col_30.split(', '));
            if(match.col_31) {
                const lines = match.col_31.split('\n');
                setMultiValues('group_field_22', lines.map(line => line.split(' (')[0]));
            }

            document.getElementById('field_28').value = match.col_37 !== undefined ? match.col_37 : 500;
            document.getElementById('field_29').value = match.col_38 || "";

            for(let c = 30; c <= 50; c++) {
                const targetInput = document.getElementById(`field_${c}`);
                if(targetInput) {
                    const srcColIndex = 39 + (c - 30);
                    targetInput.value = match["col_" + srcColIndex] || 0;
                }
            }
            rebuildDynamicButtons();
        }

        function submitData(statusMode) {
            if (GOOGLE_WEB_APP_URL.includes("여기에_")) {
                alert("🛑 구글 웹앱 URL이 설정되지 않아 저장이 불가능합니다.");
                return;
            }
            
            const coffeeName = document.getElementById('field_1').value.trim();
            if(!coffeeName) {
                alert(currentLang === 'ko' ? "⚠ 커피 이름을 먼저 입력해 주세요." : "⚠ Please input the Coffee Name first.");
                return;
            }

            if(statusMode === 'Completed') {
                const checkMsg = currentLang === 'ko' 
                    ? `⚠️ [검사 완료 최종 처리]\n\n정말로 작성을 완료하시겠습니까?\n완료된 데이터는 앱에서 더 이상 편집할 수 없도록 격리됩니다.` 
                    : `⚠️ [Complete Inspection]\n\nAre you sure you want to complete this inspection?\nCompleted data will be locked and isolated.`;
                if(!confirm(checkMsg)) return;
            }

            let rowId = document.getElementById('currentRowId').value;
            if(!rowId) {
                rowId = "ID_" + Date.now() + "_" + Math.floor(Math.random()*1000);
            }

            const fields = {};
            fields["field_1"] = coffeeName;
            fields["field_2"] = getSingleValue('group_field_2');
            fields["field_3"] = ""; fields["field_4"] = ""; fields["field_5"] = ""; fields["field_6"] = ""; fields["field_7"] = ""; fields["field_8"] = ""; fields["field_9"] = ""; fields["field_10"] = "";
            fields["field_11"] = document.getElementById('field_3').value;
            fields["field_12"] = ""; fields["field_13"] = ""; fields["field_14"] = ""; fields["field_15"] = ""; fields["field_16"] = "";
            fields["field_17"] = getSingleValue('group_field_9');
            
            const manualEn = document.getElementById('field_10').value.trim();
            fields["field_18"] = manualEn ? manualEn : `[Ref KO] ${document.getElementById('field_11').value}`;
            fields["field_19"] = document.getElementById('field_11').value;
            fields["field_20"] = "";
            
            const probKos = getMultiValues('group_field_13');
            fields["field_21"] = probKos.map(k => DICTIONARY.problem[k]).join(', ');
            fields["field_22"] = getSingleValue('group_field_14');
            
            const sizeKo = getSingleValue('group_field_15');
            fields["field_23"] = sizeKo ? `${sizeKo} (${DICTIONARY.sizeComment[sizeKo]})` : "";
            
            fields["field_24"] = getSingleValue('group_field_16');
            fields["field_25"] = getSingleValue('group_field_17');
            fields["field_26"] = getSingleValue('group_field_18');
            fields["field_27"] = "";
            fields["field_28"] = getSingleValue('group_field_19');
            fields["field_20"] = getSingleValue('group_field_20'); // AC열 매핑구간 인덱싱 보존
            fields["field_29"] = getSingleValue('group_field_20'); // AC열 동기화
            fields["field_30"] = getMultiValues('group_field_21').join(', ');
            
            const defComKos = getMultiValues('group_field_22');
            fields["field_31"] = defComKos.map(k => `${k} (${DICTIONARY.defectComment[k]})`).join('\n');
            
            fields["field_32"] = ""; fields["field_33"] = ""; fields["field_34"] = ""; fields["field_35"] = ""; fields["field_36"] = "";
            fields["field_37"] = parseInt(document.getElementById('field_28').value) || 500;
            fields["field_38"] = parseFloat(document.getElementById('field_29').value) || 0;

            for(let c = 30; c <= 50; c++) {
                const targetInput = document.getElementById(`field_${c}`);
                const val = targetInput ? (parseInt(targetInput.value) || 0) : 0;
                const destFieldIndex = 39 + (c - 30);
                fields["field_" + destFieldIndex] = val;
            }

            const payload = { rowId: rowId, status: statusMode, fields: fields };

            const formInputs = document.getElementById('qcForm').querySelectorAll('button, input, textarea');
            formInputs.forEach(i => i.disabled = true);

            fetch(GOOGLE_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert(currentLang === 'ko' ? "🎉 처리가 완료되었습니다!" : "🎉 Data submitted successfully!");
                location.reload();
            })
            .catch(err => {
                alert("❌ 통신 에러가 발생했습니다. 키보드의 F12를 눌러 [Console] 탭에 뜨는 빨간색 에러 메시지를 캡처해서 보여주세요!");
                console.error(err);
                formInputs.forEach(i => i.disabled = false);
            });
        }
    </script>
</body>
</html>
